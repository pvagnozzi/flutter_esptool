name: Bug report
description: Report a reproducible issue in flutter_esptool
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Short description of the issue.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact steps, environment, and input data.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: scenario_class
    attributes:
      label: Scenario class
      description: Which validation path is affected?
      options:
        - good path
        - bad path
        - edge case
    validations:
      required: true
  - type: dropdown
    id: security_impact
    attributes:
      label: Security impact
      options:
        - none known
        - low
        - medium
        - high
        - critical
    validations:
      required: true
