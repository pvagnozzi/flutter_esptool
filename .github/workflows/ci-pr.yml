name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - dev
      - test
      - stable
      - main

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

  unit-tests:
    name: Unit tests (good/bad/edge)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Run unit tests
        run: flutter test test/unit

  integration-tests:
    name: Integration tests (good/bad/edge)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Run integration tests
        run: flutter test test/integration

  e2e-tests:
    name: E2E tests (good/bad/edge)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Run e2e tests
        run: flutter test test/e2e

  coverage:
    name: Coverage report
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter test --coverage test/unit
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info
      - name: Check coverage threshold
        run: |
          LINES=$(grep -c "^DA:" coverage/lcov.info || echo 0)
          HIT=$(grep "^DA:.*,[^0]" coverage/lcov.info | wc -l || echo 0)
          PCT=$((HIT * 100 / LINES))
          echo "Coverage: $PCT%"
          if [ "$PCT" -lt 70 ]; then
            echo "Coverage $PCT% < 70% threshold"
            exit 1
          fi
