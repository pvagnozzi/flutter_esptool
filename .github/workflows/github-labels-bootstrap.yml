name: Bootstrap GitHub Labels

on:
  workflow_dispatch:

jobs:
  bootstrap:
    name: Create or update repository labels
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create or update labels
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const labels = [
              {
                name: 'needs-review',
                color: '0075ca',
                description: 'Awaiting review',
              },
              {
                name: 'library',
                color: 'e4e669',
                description: 'Core library code',
              },
              {
                name: 'testing',
                color: 'bfd4f2',
                description: 'Test files and coverage',
              },
              {
                name: 'ci-cd',
                color: 'f9d0c4',
                description: 'CI/CD pipeline changes',
              },
              {
                name: 'documentation',
                color: '0075ca',
                description: 'Documentation updates',
              },
              {
                name: 'example',
                color: 'cfd3d7',
                description: 'Example app changes',
              },
              {
                name: 'docker',
                color: '0e8a16',
                description: 'Docker configuration',
              },
              {
                name: 'tooling',
                color: 'e99695',
                description: 'Build tools and scripts',
              },
              {
                name: 'dependencies',
                color: '0052cc',
                description: 'Dependency updates',
              },
              {
                name: 'changelog',
                color: 'fef2c0',
                description: 'Changelog updates',
              },
              {
                name: 'dart',
                color: '00B4AB',
                description: 'Dart language specific',
              },
              {
                name: 'enhancement',
                color: 'a2eeef',
                description: 'New feature or request',
              },
              {
                name: 'bug',
                color: 'd73a4a',
                description: 'Something is broken',
              },
              {
                name: 'security',
                color: 'b60205',
                description: 'Security vulnerability or fix',
              },
              {
                name: 'breaking-change',
                color: 'e11d48',
                description: 'Introduces a breaking change',
              },
              {
                name: 'help-wanted',
                color: '008672',
                description: 'Extra attention needed',
              },
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: label.name,
                  color: label.color,
                  description: label.description,
                });
                console.log(`Created: ${label.name}`);
              } catch (err) {
                if (err.status === 422) {
                  await github.rest.issues.updateLabel({
                    owner,
                    repo,
                    name: label.name,
                    color: label.color,
                    description: label.description,
                  });
                  console.log(`Updated: ${label.name}`);
                } else {
                  throw err;
                }
              }
            }
