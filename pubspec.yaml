name: flutter_esptool
description: >-
  ESP8266/ESP32 serial bootloader toolkit for Flutter and Dart.
  Typed results, chip discovery, flash workflows, and
  protocol-safe transport abstractions.
version: 0.1.4
homepage: https://github.com/pvagnozzi/flutter_esptool
repository: https://github.com/pvagnozzi/flutter_esptool
issue_tracker: https://github.com/pvagnozzi/flutter_esptool/issues

topics:
  - esp32
  - esp8266
  - serial
  - iot
  - embedded

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  platform_serial: ^0.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ">=3.0.0 <7.0.0"
  mocktail: ^1.0.4
